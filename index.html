<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wikidata to AMIE</title>
  <style>
    :root {
      --bg: #f5f6fa;
      --surface: #ffffff;
      --border: #dfe3eb;
      --text: #1e2a3a;
      --text-secondary: #5a6a7e;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-light: #eff4ff;
      --radius: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --shadow-lg: 0 4px 12px rgba(0,0,0,.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .header-login {
      display: flex;
      gap: .75rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .header-login .apex-link {
      padding: .45rem 1rem;
    }

    .header-login input {
      width: 280px;
      padding: .45rem .75rem;
      font-size: .85rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      outline: none;
      transition: border-color .15s, background .15s;
    }

    .header-login input:focus {
      border-color: var(--accent);
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
    }

    header h1 span { color: var(--accent); }

    .container {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    .search-wrapper {
      display: flex;
      gap: .75rem;
      align-items: center;
      max-width: 620px;
    }

    #mode-select {
      padding: .75rem .75rem;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      outline: none;
      cursor: pointer;
      transition: border-color .15s;
      color: var(--text);
      flex-shrink: 0;
    }

    #mode-select:focus { border-color: var(--accent); }

    .search-input-wrapper {
      position: relative;
      flex: 1;
    }

    .search-input-wrapper input {
      width: 100%;
      padding: .75rem 1rem .75rem 2.5rem;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      outline: none;
      transition: border-color .15s;
    }

    .search-input-wrapper input:focus { border-color: var(--accent); }

    .search-input-wrapper .icon {
      position: absolute;
      left: .75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      pointer-events: none;
    }

    .dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      max-height: 320px;
      overflow-y: auto;
      z-index: 10;
      display: none;
    }

    .dropdown.open { display: block; }

    .dropdown-item {
      padding: .65rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }

    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover { background: var(--accent-light); }

    .dropdown-item .label { font-weight: 500; }

    .dropdown-item .desc {
      font-size: .85rem;
      color: var(--text-secondary);
    }

    .columns {
      margin-top: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.5rem;
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      padding-bottom: .5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem 1.5rem;
    }

    .field label {
      display: block;
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--text-secondary);
      margin-bottom: .2rem;
    }

    .field .value {
      font-size: .95rem;
      min-height: 1.4em;
      color: var(--text);
    }

    .field .value.empty { color: var(--text-secondary); font-style: italic; }


    .apex-link {
      display: inline-block;
      text-align: center;
      padding: .4rem 1rem;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: .85rem;
      transition: background .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .apex-link:hover { background: var(--accent-hover); }

    .apex-link.disabled {
      background: var(--border);
      color: var(--text-secondary);
      pointer-events: none;
    }


    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: .4rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }

    .status-msg {
      padding: 2rem;
      text-align: center;
      color: var(--text-secondary);
    }

    .wiki-id {
      font-size: .8rem;
      color: var(--text-secondary);
      margin-bottom: .25rem;
    }

    .wiki-id a { color: var(--accent); text-decoration: none; }
    .wiki-id a:hover { text-decoration: underline; }

    .normdatum-section {
      margin-top: 2rem;
    }

    .normdatum-section .inline-fields {
      display: flex;
      gap: 1.5rem;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .normdatum-section .inline-field {
      flex: 1;
      min-width: 180px;
    }

    .normdatum-section .inline-field label {
      display: block;
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--text-secondary);
      margin-bottom: .3rem;
    }

    .normdatum-section .inline-field input {
      width: 100%;
      padding: .6rem .75rem;
      font-size: .95rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      outline: none;
      transition: border-color .15s;
    }

    .normdatum-section .inline-field input:focus {
      border-color: var(--accent);
    }

    .normdatum-section .readonly-value {
      padding: .6rem .75rem;
      font-size: .95rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      min-height: 2.45rem;
    }

    .normdatum-section .readonly-value.empty {
      color: var(--text-secondary);
      font-style: italic;
    }

    #main-content.locked {
      opacity: 0.45;
      pointer-events: none;
      user-select: none;
    }

    @media (max-width: 768px) {
      .field-grid { grid-template-columns: 1fr; }
      .normdatum-section .inline-fields { flex-direction: column; }
      .header-login { width: 100%; }
      .header-login input { flex: 1; min-width: 0; width: auto; }
    }
  </style>
</head>
<body>

<header>
  <h1>Wikidata <span>&rarr;</span> AMIE</h1>
  <div class="header-login">
    <input type="text" id="apex-session" placeholder="Paste AMIE URL to connect session&hellip;" autocomplete="off">
    <a id="login-btn" class="apex-link" href="https://apex.dla-marbach.de:55022/apex/f?p=150" onclick="return openAmie(this.href)" style="background:var(--text-secondary);">Login to AMIE</a>
  </div>
</header>

<div class="container">

  <div id="main-content" class="locked">
  <div class="search-wrapper">
    <select id="mode-select">
      <option value="people">People</option>
      <option value="places">Places</option>
    </select>
    <div class="search-input-wrapper">
      <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Search for a historical person&hellip;" autocomplete="off">
      <div class="dropdown" id="dropdown"></div>
    </div>
  </div>

  <div class="columns">
    <div class="card" id="detail-card">
      <h2><span id="person-name">Person Details</span> <a id="apex-link" class="apex-link disabled" href="#" onclick="return openAmie(this.href)">Create</a></h2>
      <div id="wiki-id" class="wiki-id hidden"></div>
      <div id="loading" class="status-msg hidden"><span class="spinner"></span> Loading details&hellip;</div>
      <div id="empty-state" class="status-msg">Search for someone above to see their details.</div>
      <div id="fields" class="field-grid hidden">
        <div class="field"><label>Name (Lemma1)</label><div class="value" data-field="familyName"></div></div>
        <div class="field"><label>Rufname (Lemma2)</label><div class="value" data-field="givenName"></div></div>
        <div class="field"><label>Namenszus&auml;tze (Lemma3)</label><div class="value" data-field="nobleTitle"></div></div>
        <div class="field"><label>Gender</label><div class="value" data-field="sexDisplay"></div></div>
        <div class="field"><label>Date of Birth</label><div class="value" data-field="dob"></div></div>
        <div class="field"><label>Date of Death</label><div class="value" data-field="dod"></div></div>
      </div>
    </div>

    <div class="card hidden" id="location-detail-card">
      <h2><span id="location-name">Location Details</span> <a id="apex-link-loc" class="apex-link disabled" href="#" onclick="return openAmie(this.href)">Create</a></h2>
      <div id="location-wiki-id" class="wiki-id hidden"></div>
      <div id="location-loading" class="status-msg hidden"><span class="spinner"></span> Loading details&hellip;</div>
      <div id="location-empty-state" class="status-msg">Search for a location above to see its details.</div>
      <div id="location-fields" class="field-grid hidden">
        <div class="field"><label>Location Name (Lemma1)</label><div class="value" id="loc-name-value"></div></div>
        <div class="field"><label>Coordinates</label><div class="value" id="loc-coords-value"></div></div>
      </div>
      <div id="location-map" class="hidden" style="margin-top:1rem;">
        <iframe id="loc-map-iframe" width="100%" height="220" style="border:1px solid var(--border);border-radius:var(--radius);" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>
  </div>

  <div class="normdatum-section">
    <div class="card">
      <h2>Add Normdatum <a id="nd-apex-link" class="apex-link disabled" href="#" onclick="return openAmie(this.href)">Create</a></h2>
      <div class="inline-fields">
        <div class="inline-field">
          <label for="nd-lid">LID (from Step 1)</label>
          <input type="text" id="nd-lid" placeholder="Paste the LID here&hellip;" autocomplete="off">
        </div>
        <div class="inline-field">
          <label id="nd-data-label">Wikidata ID</label>
          <div id="nd-qid-display" class="readonly-value empty">&mdash;</div>
        </div>
        <div class="inline-field">
          <label>Art</label>
          <div id="nd-art-display" class="readonly-value">Wikidata</div>
        </div>
        <div class="inline-field">
          <label>Gewissheit</label>
          <div id="nd-gewissheit-display" class="readonly-value">gewiss</div>
        </div>
      </div>

    </div>
  </div>
  </div>
</div>

<script>
(function () {
  /* ── APEX configuration ── */
  let apexSession = '0';

  function hasSession() {
    return apexSession !== '0' && /^\d+$/.test(apexSession);
  }

  function updateSessionUI() {
    const valid = hasSession();
    const input = document.getElementById('apex-session');
    input.style.borderColor = valid ? '#16a34a' : '';
    input.style.background = valid ? '#f0fdf4' : '';
    document.getElementById('main-content').classList.toggle('locked', !valid);
    const loginBtn = document.getElementById('login-btn');
    loginBtn.style.opacity = valid ? '0.45' : '';
    loginBtn.style.pointerEvents = valid ? 'none' : '';
  }

  function apexBaseUrl() {
    return `https://apex.dla-marbach.de:55022/apex/f?p=150:2:${apexSession}::NO:2`;
  }
  function apexNdBase() {
    return `https://apex.dla-marbach.de:55022/apex/f?p=150:14:${apexSession}::NO:14`;
  }
  const APEX_ITEMS  = [
    'P2_LEMMA1', 'P2_LEMMA2', 'P2_LEMMA3', 'P2_LEMMA4',
    'P2_GENDER',
    'P2_VONTAG', 'P2_VONMONAT', 'P2_VONJAHR',
    'P2_BISTAG', 'P2_BISMONAT', 'P2_BISJAHR',
    'P2_REGISTER', 'P2_BEARBEITER', 'P2_SORTIERFELD'
  ];
  /* Field keys must match the order of APEX_ITEMS */
  const FIELD_KEYS = [
    'familyName', 'givenName', 'nobleTitle', 'givenName',
    'sex',
    'dobDay', 'dobMonth', 'dobYear',
    'dodDay', 'dodMonth', 'dodYear',
    'register', 'bearbeiter', 'sortField'
  ];

  /* ── DOM refs ── */
  const searchInput   = document.getElementById('search');
  const dropdown      = document.getElementById('dropdown');
  const fieldsEl      = document.getElementById('fields');
  const loadingEl     = document.getElementById('loading');
  const emptyEl       = document.getElementById('empty-state');
  const personNameEl  = document.getElementById('person-name');
  const wikiIdEl      = document.getElementById('wiki-id');
  const apexLinkEl    = document.getElementById('apex-link');
  const apexLinkLocEl = document.getElementById('apex-link-loc');

  const ndLidInput    = document.getElementById('nd-lid');
  const ndQidDisplay  = document.getElementById('nd-qid-display');
  const ndLinkEl      = document.getElementById('nd-apex-link');

  const modeSelect        = document.getElementById('mode-select');
  const detailCard        = document.getElementById('detail-card');
  const locationCard      = document.getElementById('location-detail-card');
  const locationNameEl    = document.getElementById('location-name');
  const locationWikiIdEl  = document.getElementById('location-wiki-id');
  const locationLoadingEl = document.getElementById('location-loading');
  const locationEmptyEl   = document.getElementById('location-empty-state');
  const locationFieldsEl  = document.getElementById('location-fields');
  const locNameValue      = document.getElementById('loc-name-value');
  const locCoordsValue    = document.getElementById('loc-coords-value');
  const locationMapEl     = document.getElementById('location-map');
  const locMapIframe      = document.getElementById('loc-map-iframe');
  const ndDataLabel       = document.getElementById('nd-data-label');
  const ndArtDisplay      = document.getElementById('nd-art-display');
  const ndGewissDisplay   = document.getElementById('nd-gewissheit-display');

  let debounceTimer = null;
  let currentData   = {};
  let currentQID    = '';
  let currentMode   = 'people';
  let currentCoords = '';

  /* ── Mode toggle ── */
  modeSelect.addEventListener('change', () => {
    currentMode = modeSelect.value;
    searchInput.value = '';
    closeDropdown();
    currentData = {};
    currentQID = '';
    currentCoords = '';

    if (currentMode === 'people') {
      searchInput.placeholder = 'Search for a historical person\u2026';
      detailCard.classList.remove('hidden');
      locationCard.classList.add('hidden');
      showEmpty();
      ndDataLabel.textContent = 'Wikidata ID';
      ndArtDisplay.textContent = 'Wikidata';
      ndGewissDisplay.textContent = 'gewiss';
    } else {
      searchInput.placeholder = 'Search for a location\u2026';
      detailCard.classList.add('hidden');
      locationCard.classList.remove('hidden');
      showLocationEmpty();
      ndDataLabel.textContent = 'Coordinates';
      ndArtDisplay.textContent = 'Geodaten';
      ndGewissDisplay.textContent = '100';
    }

    ndQidDisplay.textContent = '\u2014';
    ndQidDisplay.classList.add('empty');
    apexLinkEl.classList.add('disabled');
    apexLinkEl.href = '#';
    apexLinkLocEl.classList.add('disabled');
    apexLinkLocEl.href = '#';
    ndLinkEl.classList.add('disabled');
    ndLinkEl.href = '#';
  });

  /* ── Search (wbsearchentities) ── */
  searchInput.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    const q = searchInput.value.trim();
    if (q.length < 2) { closeDropdown(); return; }
    debounceTimer = setTimeout(() => {
      if (currentMode === 'places') searchNominatim(q);
      else searchWikidata(q);
    }, 300);
  });

  async function searchWikidata(term) {
    const url = 'https://www.wikidata.org/w/api.php?action=wbsearchentities'
      + '&search=' + encodeURIComponent(term)
      + '&language=en&uselang=en&type=item&limit=10&format=json&origin=*';
    try {
      const res = await fetch(url);
      const json = await res.json();
      renderDropdown(json.search || []);
    } catch (err) {
      console.error('Search failed:', err);
      closeDropdown();
    }
  }

  async function searchNominatim(term) {
    const url = 'https://nominatim.openstreetmap.org/search?q='
      + encodeURIComponent(term)
      + '&format=json&limit=10&addressdetails=1&accept-language=de';
    try {
      const res = await fetch(url, {
        headers: { 'User-Agent': 'WikidataToAMIE/1.0' }
      });
      const results = await res.json();
      renderLocationDropdown(results);
    } catch (err) {
      console.error('Nominatim search failed:', err);
      closeDropdown();
    }
  }

  function renderLocationDropdown(items) {
    if (!items.length) { closeDropdown(); return; }
    dropdown.innerHTML = items.map(item =>
      `<div class="dropdown-item" data-lat="${item.lat}" data-lon="${item.lon}" data-name="${esc(item.name || item.display_name)}">
        <div class="label">${esc(item.display_name)}</div>
        <div class="desc">${esc(item.type || '')}</div>
      </div>`
    ).join('');
    dropdown.classList.add('open');

    dropdown.querySelectorAll('.dropdown-item').forEach(el => {
      el.addEventListener('click', () => {
        const name = el.dataset.name;
        const lat = el.dataset.lat;
        const lon = el.dataset.lon;
        searchInput.value = name;
        closeDropdown();
        applyLocationFromNominatim(name, lat, lon);
      });
    });
  }

  function renderDropdown(items) {
    if (!items.length) { closeDropdown(); return; }
    dropdown.innerHTML = items.map(item =>
      `<div class="dropdown-item" data-id="${item.id}">
        <div class="label">${esc(item.label)}</div>
        <div class="desc">${esc(item.description || '')}</div>
      </div>`
    ).join('');
    dropdown.classList.add('open');

    dropdown.querySelectorAll('.dropdown-item').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.id;
        const label = el.querySelector('.label').textContent;
        searchInput.value = label;
        closeDropdown();
        if (currentMode === 'people') {
          fetchPersonDetails(id, label);
        } else {
          fetchLocationDetails(id, label);
        }
      });
    });
  }

  function closeDropdown() { dropdown.classList.remove('open'); }

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-wrapper')) closeDropdown();
  });

  /* ── Detail fetch (SPARQL) ── */
  async function fetchPersonDetails(qid, label) {
    showLoading();
    const sparql = `
SELECT ?nobleTitleLabel ?familyNameLabel ?givenNameLabel
       ?sexLabel ?dob ?dod
WHERE {
  BIND(wd:${qid} AS ?item)
  OPTIONAL { ?item wdt:P97  ?nobleTitle. }
  OPTIONAL { ?item wdt:P734 ?familyName. }
  OPTIONAL { ?item wdt:P735 ?givenName. }
  OPTIONAL { ?item wdt:P21  ?sex. }
  OPTIONAL { ?item wdt:P569 ?dob. }
  OPTIONAL { ?item wdt:P570 ?dod. }
  SERVICE wikibase:label { bd:serviceParam wikibase:language "en". }
}
LIMIT 1`;

    try {
      const url = 'https://query.wikidata.org/sparql?format=json&query=' + encodeURIComponent(sparql);
      const res = await fetch(url);
      const json = await res.json();
      const row = (json.results.bindings || [])[0] || {};

      const dobParts = splitDate(val(row.dob));
      const dodParts = splitDate(val(row.dod));
      const familyName = val(row.familyNameLabel);
      const givenName  = val(row.givenNameLabel);

      currentData = {
        nobleTitle: val(row.nobleTitleLabel),
        familyName: familyName,
        givenName:  givenName,
        sex:        mapGender(val(row.sexLabel)),
        sexDisplay: val(row.sexLabel),
        dob:        formatDate(val(row.dob)),
        dod:        formatDate(val(row.dod)),
        dobDay:     dobParts.day,
        dobMonth:   dobParts.month,
        dobYear:    dobParts.year,
        dodDay:     dodParts.day,
        dodMonth:   dodParts.month,
        dodYear:    dodParts.year,
        register:   'Personen',
        bearbeiter: 'XCD',
        sortField:  removeDiacritics([familyName, givenName, dobParts.year].filter(Boolean).join(' ')),
      };

      currentQID = qid;
      renderFields(qid, label);
    } catch (err) {
      console.error('SPARQL query failed:', err);
      emptyEl.textContent = 'Failed to load details. Please try again.';
      showEmpty();
    }
  }

  function val(binding) {
    return binding ? binding.value : '';
  }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function splitDate(iso) {
    if (!iso) return { day: '', month: '', year: '' };
    const d = new Date(iso);
    if (isNaN(d.getTime())) return { day: '', month: '', year: '' };
    return {
      day:   String(d.getUTCDate()).padStart(2, '0'),
      month: String(d.getUTCMonth() + 1).padStart(2, '0'),
      year:  String(d.getUTCFullYear()),
    };
  }

  function removeDiacritics(str) {
    return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }

  function mapGender(wikidataLabel) {
    const lower = (wikidataLabel || '').toLowerCase();
    if (lower === 'male')   return 'm';
    if (lower === 'female') return 'w';
    return 'non';
  }

  /* ── Render ── */
  function renderFields(qid, label) {
    personNameEl.textContent = label;
    wikiIdEl.innerHTML = `<a href="https://www.wikidata.org/wiki/${qid}" target="_blank" rel="noopener">${qid}</a>`;
    wikiIdEl.classList.remove('hidden');

    document.querySelectorAll('#fields .value').forEach(el => {
      const key = el.dataset.field;
      const v = currentData[key] || '';
      el.textContent = v || '—';
      el.classList.toggle('empty', !v);
    });

    loadingEl.classList.add('hidden');
    emptyEl.classList.add('hidden');
    fieldsEl.classList.remove('hidden');

    buildApexLink();

    ndQidDisplay.textContent = qid;
    ndQidDisplay.classList.remove('empty');
    buildNormdatumLink();
  }

  function showLoading() {
    fieldsEl.classList.add('hidden');
    emptyEl.classList.add('hidden');
    loadingEl.classList.remove('hidden');
    wikiIdEl.classList.add('hidden');
    personNameEl.textContent = 'Loading\u2026';
    apexLinkEl.classList.add('disabled');
    apexLinkEl.href = '#';
  }

  function showEmpty() {
    fieldsEl.classList.add('hidden');
    loadingEl.classList.add('hidden');
    emptyEl.classList.remove('hidden');
  }

  /* ── Location detail fetch (SPARQL) ── */
  async function fetchLocationDetails(qid, label) {
    showLocationLoading();
    const sparql = `
SELECT ?coords WHERE {
  BIND(wd:${qid} AS ?item)
  OPTIONAL { ?item wdt:P625 ?coords. }
} LIMIT 1`;

    try {
      const url = 'https://query.wikidata.org/sparql?format=json&query=' + encodeURIComponent(sparql);
      const res = await fetch(url);
      const json = await res.json();
      const row = (json.results.bindings || [])[0] || {};

      const coords = parseWktPoint(val(row.coords));

      currentData = {
        locationName: label,
        coordinates: coords,
        register: 'Orte',
        bearbeiter: 'XCD',
        sortField: removeDiacritics(label),
      };
      currentCoords = coords;
      currentQID = qid;
      renderLocationFields(qid, label);
    } catch (err) {
      console.error('SPARQL query failed:', err);
      locationEmptyEl.textContent = 'Failed to load details. Please try again.';
      showLocationEmpty();
    }
  }

  function parseWktPoint(wkt) {
    if (!wkt) return '';
    const m = wkt.match(/Point\(([^ ]+) ([^ ]+)\)/i);
    if (!m) return '';
    return m[2] + ', ' + m[1];
  }

  function applyLocationFromNominatim(name, lat, lon) {
    const coords = lat + ', ' + lon;
    currentData = {
      locationName: name,
      coordinates: coords,
      register: 'Orte',
      bearbeiter: 'XCD',
      sortField: removeDiacritics(name),
    };
    currentCoords = coords;
    currentQID = '';
    renderLocationFieldsOSM(name, lat, lon);
  }

  function renderLocationFieldsOSM(label, lat, lon) {
    locationNameEl.textContent = label;
    const osmUrl = 'https://www.openstreetmap.org/#map=12/' + lat + '/' + lon;
    locationWikiIdEl.innerHTML = `<a href="${osmUrl}" target="_blank" rel="noopener">View on OpenStreetMap</a>`;
    locationWikiIdEl.classList.remove('hidden');

    locNameValue.textContent = label;
    locNameValue.classList.remove('empty');

    const coords = currentData.coordinates || '';
    locCoordsValue.textContent = coords || '\u2014';
    locCoordsValue.classList.toggle('empty', !coords);

    if (coords) {
      const fLat = parseFloat(lat);
      const fLon = parseFloat(lon);
      locMapIframe.src = 'https://www.openstreetmap.org/export/embed.html?bbox='
        + (fLon - 0.05) + ',' + (fLat - 0.05) + ',' + (fLon + 0.05) + ',' + (fLat + 0.05)
        + '&layer=mapnik&marker=' + fLat + ',' + fLon;
      locationMapEl.classList.remove('hidden');
    } else {
      locationMapEl.classList.add('hidden');
      locMapIframe.src = '';
    }

    locationLoadingEl.classList.add('hidden');
    locationEmptyEl.classList.add('hidden');
    locationFieldsEl.classList.remove('hidden');

    buildApexLink();

    ndQidDisplay.textContent = coords || '\u2014';
    ndQidDisplay.classList.toggle('empty', !coords);
    buildNormdatumLink();
  }

  function renderLocationFields(qid, label) {
    locationNameEl.textContent = label;
    locationWikiIdEl.innerHTML = `<a href="https://www.wikidata.org/wiki/${qid}" target="_blank" rel="noopener">${qid}</a>`;
    locationWikiIdEl.classList.remove('hidden');

    locNameValue.textContent = label;
    locNameValue.classList.remove('empty');

    const coords = currentData.coordinates || '';
    locCoordsValue.textContent = coords || '\u2014';
    locCoordsValue.classList.toggle('empty', !coords);

    if (coords) {
      locMapIframe.src = 'https://maps.google.com/maps?q=' + encodeURIComponent(coords) + '&z=12&output=embed';
      locationMapEl.classList.remove('hidden');
    } else {
      locationMapEl.classList.add('hidden');
      locMapIframe.src = '';
    }

    locationLoadingEl.classList.add('hidden');
    locationEmptyEl.classList.add('hidden');
    locationFieldsEl.classList.remove('hidden');

    buildApexLink();

    ndQidDisplay.textContent = coords || '\u2014';
    ndQidDisplay.classList.toggle('empty', !coords);
    buildNormdatumLink();
  }

  function showLocationLoading() {
    locationFieldsEl.classList.add('hidden');
    locationEmptyEl.classList.add('hidden');
    locationMapEl.classList.add('hidden');
    locMapIframe.src = '';
    locationLoadingEl.classList.remove('hidden');
    locationWikiIdEl.classList.add('hidden');
    locationNameEl.textContent = 'Loading\u2026';
    apexLinkLocEl.classList.add('disabled');
    apexLinkLocEl.href = '#';
  }

  function showLocationEmpty() {
    locationFieldsEl.classList.add('hidden');
    locationLoadingEl.classList.add('hidden');
    locationMapEl.classList.add('hidden');
    locMapIframe.src = '';
    locationEmptyEl.classList.remove('hidden');
  }

  /* ── APEX URL builder ── */
  function buildApexLink() {
    let itemNames, itemValues;

    if (currentMode === 'places') {
      const items = ['P2_LEMMA1', 'P2_REGISTER', 'P2_BEARBEITER', 'P2_SORTIERFELD'];
      const vals  = [
        currentData.locationName || '',
        currentData.register || 'Orte',
        currentData.bearbeiter || 'XCD',
        currentData.sortField || '',
      ].map(encodeURIComponent);
      itemNames  = items.join(',');
      itemValues = vals.join(',');
    } else {
      itemNames  = APEX_ITEMS.join(',');
      itemValues = FIELD_KEYS.map(k => encodeURIComponent(currentData[k] || '')).join(',');
    }

    const url = `${apexBaseUrl()}:${itemNames}:${itemValues}`;
    const btn = currentMode === 'places' ? apexLinkLocEl : apexLinkEl;
    btn.href = url;
    btn.classList.toggle('disabled', !hasSession());
  }

  /* ── Normdatum URL builder ── */
  function buildNormdatumLink() {
    const lid = ndLidInput.value.trim();
    const hasData = currentMode === 'places' ? !!currentCoords : !!currentQID;
    if (!lid || !hasData) {
      ndLinkEl.classList.add('disabled');
      ndLinkEl.href = '#';
      return;
    }
    const items = 'P14_NLID,P14_ART,P14_NORMDATUM,P14_GEWISSHEIT';
    let values;
    if (currentMode === 'places') {
      values = [lid, 'Geodaten', currentCoords, '100'].map(encodeURIComponent).join(',');
    } else {
      values = [lid, 'Wikidata', currentQID, '100'].map(encodeURIComponent).join(',');
    }
    const url = `${apexNdBase()}:${items}:${values}`;
    ndLinkEl.href = url;
    ndLinkEl.classList.toggle('disabled', !hasSession());
  }

  ndLidInput.addEventListener('input', buildNormdatumLink);

  const sessionInput = document.getElementById('apex-session');
  sessionInput.addEventListener('input', () => {
    const raw = sessionInput.value.trim();
    const match = raw.match(/f\?p=\d+:\d+:(\d+)/);
    apexSession = match ? match[1] : (raw.match(/^\d+$/) ? raw : '0');
    localStorage.setItem('apexSession', apexSession);
    if (Object.keys(currentData).length) buildApexLink();
    buildNormdatumLink();
    updateSessionUI();
  });

  const savedSession = localStorage.getItem('apexSession');
  if (savedSession) {
    apexSession = savedSession;
    sessionInput.value = savedSession;
  }
  updateSessionUI();

  /* ── Utility ── */
  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
})();

var amieWindow = null;
function openAmie(url) {
  if (url === '#') return false;
  if (amieWindow && !amieWindow.closed) {
    amieWindow.location.href = url;
    amieWindow.focus();
  } else {
    amieWindow = window.open(url, 'amie');
  }
  return false;
}
</script>
